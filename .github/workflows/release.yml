name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Verify
        run: bun run verify

      - name: Package release assets
        run: |
          mkdir -p release
          ( cd dist && zip -qr "../release/clowk-terminal-themes.zip" . )
          find dist -type f -print0 | while IFS= read -r -d '' f; do
            fmt="$(basename "$(dirname "$f")")"
            base="$(basename "$f" | tr ' ' '-')"
            cp "$f" "release/${fmt}-${base}"
          done
          ls -1 release

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            release/*
